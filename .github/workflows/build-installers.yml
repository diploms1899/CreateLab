name: Build Installers
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Linux: .deb + .AppImage ─────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libfuse2

      - name: Install npm dependencies
        run: cd desktop && npm ci

      - name: Build Linux installers
        run: cd desktop && npm run build:installers

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CreateLab-Linux-deb
          path: desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: CreateLab-Linux-AppImage
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ── Windows: .msi (bundles WebView2, proper DLLs) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: cd desktop && npm ci

      - name: Build Windows installer (MSI + NSIS)
        run: cd desktop && npm run tauri:build:windows

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: CreateLab-Windows-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload .exe (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: CreateLab-Windows-exe
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ── macOS: .dmg (Apple Silicon aarch64) ──────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust (Apple Silicon native)
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: cd desktop && npm ci

      - name: Build macOS .dmg (Apple Silicon)
        run: cd desktop && npm run tauri:build:macos

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: CreateLab-macOS-dmg
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
